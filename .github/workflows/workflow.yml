name: Build and upload package

on:
  push:
    branches: ["master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies (frontend)
        working-directory: client
        run: npm install

      - name: Lint and format check (frontend)
        working-directory: client
        run: npm run lint && npm run format:check

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies (frontend)
        working-directory: client
        run: npm install

      - name: Build (frontend)
        working-directory: client
        run: npm run build

      - name: Combine with server files
        run: |
          mkdir -p deploy
          cp -r client/dist/assets deploy/
          cp -r client/dist/.vite/. deploy/
          cp -r server/. deploy/

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: project-package
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: project-package
          path: project-package

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/ssh_private_key
          chmod 600 ~/.ssh/ssh_private_key
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh_private_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          scp -i ~/.ssh/ssh_private_key -r project-package/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_PATH }}
